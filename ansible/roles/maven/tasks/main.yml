- name: Install Git
  yum:
    name: git
    state: present

- name: Download Maven
  get_url:
    url: "https://archive.apache.org/dist/maven/maven-3/3.8.4/binaries/apache-maven-3.8.4-bin.tar.gz"
    dest: "/tmp/maven.tar.gz"
    mode: '0644'

- name: Extract Maven
  unarchive:
    src: /tmp/maven.tar.gz
    dest: /opt/
    remote_src: yes

- name: Create symlink
  file:
    src: /opt/apache-maven-3.8.4
    dest: /opt/maven
    state: link