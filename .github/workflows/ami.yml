name: Packer AMI Build

on:
  workflow_dispatch:
    inputs:
      packer_action:
        description: 'Select Packer Action'
        required: true
        default: 'build'
        type: choice
        options:
          - delete
          - build

jobs:
  packer:
    runs-on: ubuntu-latest
    if: github.event.inputs.packer_action == 'build'
    defaults:
      run:
        working-directory: ./packer

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Packer
        uses: hashicorp/setup-packer@v2

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Initialize Packer
        run: packer init .

      - name: Run Selected Action
        run: |
            packer build .
      - name: Print AMI ID
        run: |
          # Extracting AMI ID from the manifest file generated by Packer
          AMI_ID=$(jq -r '.builds[-1].artifact_id' manifest.json | cut -d ":" -f2)
          echo "-------------------------------------------------------"
          echo "SUCCESS! Your Golden AMI ID is: $AMI_ID"
          echo "-------------------------------------------------------"
  delete-old-ami:
    runs-on: ubuntu-latest
    if: github.event.inputs.packer_action == 'delete'
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Deregister AMI and Delete Snapshots
        run: |
          # Set the AMI ID you want to delete
          TARGET_AMI_ID="ami-0xxxxxxxxxxxxxxx" 

          echo "Fetching snapshot ID for $TARGET_AMI_ID..."
          SNAPSHOT_ID=$(aws ec2 describe-images --image-ids $TARGET_AMI_ID \
            --query 'Images[0].BlockDeviceMappings[0].Ebs.SnapshotId' --output text)

          echo "Deregistering AMI..."
          aws ec2 deregister-image --image-id $TARGET_AMI_ID

          if [ "$SNAPSHOT_ID" != "None" ]; then
            echo "Deleting Snapshot $SNAPSHOT_ID..."
            aws ec2 delete-snapshot --snapshot-id $SNAPSHOT_ID
          fi
          
          echo "Cleanup Complete."