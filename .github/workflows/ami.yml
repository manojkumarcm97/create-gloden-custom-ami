name: Packer AMI Build

on:
  workflow_dispatch:
    inputs:
      packer_action:
        description: 'Select Packer Action'
        required: true
        default: 'build'
        type: choice
        options:
          - build
          - delete
      ami_id_to_delete:
        description: 'AMI ID to delete (Only required for "delete" action)'
        required: false
        type: string

jobs:
  # --- BUILD JOB ---
  packer-build:
    runs-on: ubuntu-latest
    if: github.event.inputs.packer_action == 'build'
    defaults:
      run:
        working-directory: ./packer

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Packer
        uses: hashicorp/setup-packer@v2

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Initialize Packer
        run: packer init .

      - name: Run Packer Build
        run: packer build -color=false .

      - name: Print AMI ID
        run: |
          # Note: Ensure your .pkr.hcl has a post-processor "manifest" block
          if [ -f "manifest.json" ]; then
            AMI_ID=$(jq -r '.builds[-1].artifact_id' manifest.json | cut -d ":" -f2)
            echo "-------------------------------------------------------"
            echo "SUCCESS! Your Golden AMI ID is: $AMI_ID"
            echo "-------------------------------------------------------"
          else
            echo "Error: manifest.json not found. Did the build finish?"
            exit 1
          fi

  # --- DELETE JOB ---
  delete-old-ami:
    runs-on: ubuntu-latest
    if: github.event.inputs.packer_action == 'delete'
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Deregister AMI and Delete Snapshots
        run: |
          TARGET_AMI_ID="${{ github.event.inputs.ami_id_to_delete }}"
          
          if [ -z "$TARGET_AMI_ID" ]; then
            echo "Error: No AMI ID provided for deletion."
            exit 1
          fi

          echo "Picking snapshot ID for $TARGET_AMI_ID..."
          # Fetching all snapshot IDs in case of multiple volumes
          SNAPSHOT_IDS=$(aws ec2 describe-images --image-ids "$TARGET_AMI_ID" \
            --query 'Images[0].BlockDeviceMappings[].Ebs.SnapshotId' --output text)

          echo "Deregistering AMI..."
          aws ec2 deregister-image --image-id "$TARGET_AMI_ID"

          for SNAPID in $SNAPSHOT_IDS; do
            if [ "$SNAPID" != "None" ] && [ -n "$SNAPID" ]; then
              echo "Deleting Snapshot $SNAPID..."
              aws ec2 delete-snapshot --snapshot-id "$SNAPID"
            fi
          done
          
          echo "Cleanup Complete."